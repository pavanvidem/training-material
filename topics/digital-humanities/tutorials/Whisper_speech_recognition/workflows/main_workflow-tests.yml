- doc: Test outline for Transcription-Speech-to-Text-(imported-from-uploaded-file)
  job:
    Video or Audio File:
      class: File
      path: https://zenodo.org/records/17949386/files/1960_kennedy-nixon_1.mp4
      filetype: mp4
    stopwords-en.txt:
      class: File
      path: https://zenodo.org/records/17047254/files/stopwords-en.txt
      filetype: txt
  outputs:
    Nixon-transcribed-cleaned:
      asserts:
        has_text:
          - "The things that Senator Kennedy has said, many of us can agree with."
          - "Not at all."
    Kennedy-transcribed-cleaned:
      asserts:
        has_text:
          - "If we fail, then freedom fails."
          - "I think we can do better."
    Word Cloud for Nixon:
      asserts:
        has_size:
                size: 70K
                delta: 20K
    Word cloud for Kennedy:
      asserts:
        has_size:
                size: 70K
                delta: 20K
