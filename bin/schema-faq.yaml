---
type: map
mapping:
    layout:
        type: str
        required: true
        enum:
            - faq
        description: |
            This must be set to `faq`
    title:
        type: str
        required: true
        description: |
            Title of the FAQ
        _examples:
            - How does the GTN implement the 'Ten simple rules for collaborative lesson development'
            - How can I give feedback?
            - Ways to use Galaxy
    description:
        type: str
        required: false
        description: |
            A short, one line description to provide additional context of the FAQ
        _examples:
        - Galaxy may have several reference genomes built-in, but you can also create your own.
        - Quickly learn what the identifiers are in any **BAM** dataset that is the result from mapping
        - Finding and Correcting Metadata
    area:
        type: str
        required: false
        description: |
            A text key used for sorting related FAQs together in the visual interface for users.
        _examples:
            - contributors
            - learners
            - features
    box_type:
        type: str
        required: true
        enum:
            - tip
            - hands_on
            - question
            - comment
            - warning
            - details
            - none
        description: |
            The type of box that should be used when rendering this FAQ. Use `none` if it should not be in a box, but just plain text.
    contributors:
        type: seq
        description: |
            Who contributed to this FAQ
        _examples:
            - shiltemann
            - hexylena
        sequence:
            - type: str
              required: true
              enum:
              - CONTRIBUTORS
              - ORGANISATIONS
    contributions:
        description: |
            List of tutorial contributors. Here we break them down into several broad categories to help contributors identify how they contributed to a specific tutorial.
        _examples: |
            contributions:
                authorship:
                    - shiltemann
                    - bebatut
                editing:
                    - hexylena
                    - bebatut
                    - natefoo
                testing:
                    - bebatut
                infrastructure:
                    - natefoo
                translation:
                    - shiltemann
                funding:
                    - gallantries
        type: map
        mapping:
            authorship:
                description: These entities wrote the bulk of the training material, they may have done the analysis, built the workflow, and wrote the text themselves.
                type: seq
                sequence:
                - type: str
                  enum:
                  - CONTRIBUTORS
                  - ORGANISATIONS
            editing:
                type: seq
                description: These entities edited the text, either for spelling and grammar, flow, GTN-fit, or other similar editing categories
                sequence:
                - type: str
                  enum:
                  - CONTRIBUTORS
                  - ORGANISATIONS
            testing:
                type: seq
                description: These entities tested the tutorial to ensure it works correctly for students, or reported issues with the tutorial.
                sequence:
                - type: str
                  enum:
                  - CONTRIBUTORS
                  - ORGANISATIONS
            ux:
                type: seq
                description: These entities contributed UX or Design improvements to this tutorial or the GTN as a whole
                sequence:
                - type: str
                  enum:
                  - CONTRIBUTORS
                  - ORGANISATIONS
            infrastructure:
                type: seq
                description: These entities managed and provided infrastructure to the GTN or for training purposes
                sequence:
                - type: str
                  enum:
                  - CONTRIBUTORS
                  - ORGANISATIONS
                  - GRANTS
            reviewing:
                type: seq
                description: This person reviewed this material for accuracy and correctness
                sequence:
                - type: str
                  enum:
                  - CONTRIBUTORS
            funding:
                type: seq
                description: These entities provided funding support for the development of this resource
                sequence:
                - type: str
                  enum:
                  - ORGANISATIONS
                  - GRANTS
            translation:
                type: seq
                description: These entities did translation and localisation work on this resource
                sequence:
                - type: str
                  enum:
                  - CONTRIBUTORS
                  - ORGANISATIONS
            data:
                type: seq
                description: These entities provided data for this resource
                sequence:
                - type: str
                  enum:
                  - CONTRIBUTORS
                  - ORGANISATIONS
                  - GRANTS

    redirect_from:
        type: seq
        sequence:
            - type: str
        description: |
            If a tutorial is renamed to a new location, use this field to list prior locations from which this tutorial was accessible.
        _examples:
        - /topics/sequence-analysis/tutorials/de-novo-rad-seq/tutorial
    required_parameters:
        type: map
        mapping:
          "=":
            type: str
        description: |
          A list of parameters that are required to be set when invoking the FAQ, otherwise the FAQ will not render correctly (e.g. in the FAQ list!)
        _examples: |
          name: The name of the dataset
    optional_parameters:
        type: map
        mapping:
          "=":
            type: str
        description: |
          Optional parameters that can enhance the experience of the learner if set correctly
        _examples: |
          format: the format they should change it to
    google_form_id:
        type: int
        description: |
            An internal ID tracking which form response generated this in the GTN Google Forms. Please do not add this manually.
    examples:
        type: map
        mapping:
          '=':
            type: map
            mapping:
              '=': {type: str}
        description: |
          A list of _examples that can be used to illustrate the FAQ's invocation
        _examples: |
          A very basic included version: {}
          A more complex example: {name: "Phages", format: "genbank"}
---
